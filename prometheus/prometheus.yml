global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "writer-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["writer-service:3002"]

  - job_name: "ecommerce-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["ecommerce-backend:5000"]